<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#f5f5f3" stroke="#e0e0de" stroke-width="0.5"/>

  <!-- hlava -->
  <circle cx="16" cy="6" r="2.8" fill="#1a1a1a"/>

  <!-- tělo -->
  <line x1="16" y1="8.8" x2="15.2" y2="17" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round"/>

  <!-- levá ruka — drží skleničku -->
  <line x1="15.6" y1="12" x2="9.5" y2="9.5" stroke="#1a1a1a" stroke-width="1.4" stroke-linecap="round"/>

  <!-- sklenička — kompletní tvar -->
  <path d="M5.5 5 L9.5 5 L8.8 9.2 L7.8 9.2 L7.8 11.5 L9 11.5 L9 12.5 L6 12.5 L6 11.5 L7.2 11.5 L7.2 9.2 L6.2 9.2 Z" fill="none" stroke="#1a1a1a" stroke-width="0.9" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- víno v skleničce -->
  <path d="M5.8 6.8 L9.2 6.8 L8.8 9.2 L6.2 9.2 Z" fill="#1a1a1a" opacity="0.2"/>

  <!-- bubliny -->
  <circle cx="6.8" cy="8" r="0.5" fill="#1a1a1a" opacity="0.5"/>
  <circle cx="8.2" cy="7.2" r="0.4" fill="#1a1a1a" opacity="0.4"/>

  <!-- šumění nad skleničkou -->
  <circle cx="6.5" cy="3.5" r="0.4" fill="#1a1a1a" opacity="0.3"/>
  <circle cx="7.6" cy="2.8" r="0.5" fill="#1a1a1a" opacity="0.35"/>
  <circle cx="8.9" cy="3.3" r="0.35" fill="#1a1a1a" opacity="0.25"/>

  <!-- pravá ruka -->
  <line x1="15.6" y1="12" x2="21" y2="14" stroke="#1a1a1a" stroke-width="1.4" stroke-linecap="round"/>

  <!-- nohy -->
  <line x1="15.2" y1="17" x2="11.5" y2="24.5" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="15.2" y1="17" x2="19.5" y2="23.5" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- boty -->
  <line x1="11.5" y1="24.5" x2="9" y2="25.5" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19.5" y1="23.5" x2="22" y2="24.5" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- pohybové čáry -->
  <line x1="24" y1="15" x2="27.5" y2="15" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round" opacity="0.2"/>
  <line x1="25" y1="17.5" x2="28" y2="17.5" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round" opacity="0.15"/>
  <line x1="24" y1="20" x2="27" y2="20" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round" opacity="0.1"/>
</svg>

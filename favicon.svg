<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Černé zakulacené pozadí -->
  <rect width="32" height="32" rx="7" fill="#1a1a1a"/>
  
  <!-- Sklenička prosecco -->
  <path d="M7 6 L11 6 L10 14 L8 14 Z" fill="none" stroke="#e8c97a" stroke-width="1.2" stroke-linejoin="round"/>
  <line x1="9" y1="14" x2="9" y2="18" stroke="#e8c97a" stroke-width="1.2"/>
  <line x1="7" y1="18" x2="11" y2="18" stroke="#e8c97a" stroke-width="1.2"/>
  <!-- Bubliny v proseccu -->
  <circle cx="8.5" cy="11" r="0.6" fill="#e8c97a" opacity="0.7"/>
  <circle cx="10" cy="9" r="0.5" fill="#e8c97a" opacity="0.5"/>
  <circle cx="9" cy="8" r="0.4" fill="#e8c97a" opacity="0.6"/>

  <!-- Běžec (stylizovaný) -->
  <!-- hlava -->
  <circle cx="22" cy="8" r="2.2" fill="white"/>
  <!-- tělo -->
  <line x1="22" y1="10.2" x2="21" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- ruce -->
  <line x1="21" y1="12" x2="17.5" y2="11" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="21" y1="12" x2="24.5" y2="13.5" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
  <!-- nohy -->
  <line x1="21" y1="16" x2="18.5" y2="20.5" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="21" y1="16" x2="24" y2="20" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
  <!-- bota 1 -->
  <line x1="18.5" y1="20.5" x2="16.5" y2="21.5" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
  <!-- bota 2 -->
  <line x1="24" y1="20" x2="26" y2="21" stroke="white" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Cílová páska dole -->
  <rect x="3" y="24" width="26" height="3" rx="1.5" fill="#e8c97a" opacity="0.9"/>
  <rect x="3" y="24" width="3" height="3" rx="1" fill="#1a1a1a" opacity="0.4"/>
  <rect x="9" y="24" width="3" height="3" fill="#1a1a1a" opacity="0.4"/>
  <rect x="15" y="24" width="3" height="3" fill="#1a1a1a" opacity="0.4"/>
  <rect x="21" y="24" width="3" height="3" fill="#1a1a1a" opacity="0.4"/>
</svg>
